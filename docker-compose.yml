services:
  wordpress:
    image: wordpress:php8.3
    depends_on:
      - database
      - mailpit
    volumes:
      - ./wp:/var/www/html
      - ./:/var/www/html/wp-content/plugins/pagbank-for-woocommerce
      - ./wordpress.ini:/usr/local/etc/php/conf.d/wordpress.ini
      - ./logs:/var/log
      - ./certs:/etc/ssl/custom-certs:ro
      - ./ssl.conf:/etc/apache2/sites-available/ssl.conf:ro
    entrypoint: |
      bash -c "
        # Install Xdebug if not present
        if ! php -m | grep -q xdebug; then
          echo 'Installing Xdebug...'
          yes | pecl install xdebug
          docker-php-ext-enable xdebug
          echo 'Xdebug installed successfully!'
        else
          echo 'Xdebug is already installed.'
        fi

        # SSL Certificate setup
        if ls /etc/ssl/custom-certs/*.crt 1>/dev/null 2>&1; then
          echo 'Using custom SSL certificates from ./certs/'
          cp /etc/ssl/custom-certs/*.crt /etc/ssl/certs/server.crt
          cp /etc/ssl/custom-certs/*.key /etc/ssl/private/server.key
        else
          echo 'No custom certificates found, generating self-signed certificate...'
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/ssl/private/server.key -out /etc/ssl/certs/server.crt -subj '/CN=localhost/O=PagBank Development/C=BR'
          echo 'Self-signed certificate generated!'
        fi
        chmod 600 /etc/ssl/private/server.key

        a2enmod ssl
        a2ensite ssl
        exec apache2-foreground
      "
    ports:
      - 80:80
      - 443:443
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress

  database:
    image: mariadb
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress

  wordpress-cli:
    image: wordpress:cli
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/html
      - ./wp:/var/www/html
      - ./:/var/www/html/wp-content/plugins/pagbank-for-woocommerce
    profiles:
      - tools

  phpmyadmin:
    image: phpmyadmin
    depends_on:
      - database
    ports:
      - 8080:80
    environment:
      PMA_ARBITRARY: 0
      PMA_HOST: database
      PMA_VERBOSE: wordpress
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
      PHP_UPLOAD_MAX_FILESIZE: 1G
      PHP_MAX_INPUT_VARS: 1G

  mailpit:
    image: axllent/mailpit
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  composer:
    image: composer:latest
    user: '${UID:-1000}:${GID:-1000}'
    volumes:
      - ./composer.json:/app/composer.json
      - ./composer.lock:/app/composer.lock
      - ./vendor:/app/vendor
    working_dir: /app
    profiles:
      - tools

  php-tools:
    image: wordpress:php8.3
    user: '${UID:-1000}:${GID:-1000}'
    volumes:
      - ./:/var/www/html/wp-content/plugins/pagbank-for-woocommerce
    working_dir: /var/www/html/wp-content/plugins/pagbank-for-woocommerce
    profiles:
      - tools

volumes:
  db_data: {}
  wp_data: {}
